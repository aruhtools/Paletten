<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palettenverwaltung PRO + Firebase</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="manifest" href="manifest.json">

  <style>
    body { padding: 20px; }
  </style>
</head>
<body>
  <nav class="navbar navbar-light bg-light mb-4">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">Palettenverwaltung PRO + Firebase</span>
      <div class="d-flex gap-2">
        <button class="btn btn-secondary" data-bs-toggle="modal" data-bs-target="#settingsModal">Einstellungen</button>
        <button class="btn btn-warning" id="exportCSV">CSV Export</button>
        <button class="btn btn-danger" id="clearBtn">Aktuelle Daten löschen</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="alert alert-secondary" id="syncStatus">Synchronisierung wird vorbereitet ...</div>

    <h3>Aktueller Palettenstand</h3>
    <table class="table table-striped" id="standTable">
      <thead>
        <tr><th>Spedition</th><th>Stand</th></tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="card mb-4">
      <div class="card-header">Neuer Eintrag</div>
      <div class="card-body">
        <form id="entryForm">
          <div class="row">
            <div class="col-md-3">
              <label class="form-label">Datum</label>
              <input type="date" id="datum" class="form-control" required>
            </div>
            <div class="col-md-3">
              <label class="form-label">Spedition</label>
              <select id="spedition" class="form-control" required>
                <option value="">Bitte wählen</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label">Erhalten</label>
              <input type="number" id="erhalten" class="form-control" value="0" min="0">
            </div>
            <div class="col-md-3">
              <label class="form-label">Abgegeben</label>
              <input type="number" id="abgegeben" class="form-control" value="0" min="0">
            </div>
          </div>

          <div class="row mt-2">
            <div class="col-md-4">
              <label class="form-label">Erfasser</label>
              <select id="erfasser" class="form-control" required>
                <option value="">Bitte wählen</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">Lieferscheinnummer</label>
              <input type="text" id="lieferschein" class="form-control" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Notizen</label>
              <input type="text" id="notizen" class="form-control">
            </div>
          </div>

          <div class="mt-3 d-flex gap-2">
            <button type="submit" class="btn btn-primary" id="saveBtn">Speichern</button>
            <button type="button" class="btn btn-secondary" id="cancelEditBtn" style="display:none;">
              Abbrechen
            </button>
          </div>
        </form>
      </div>
    </div>

    <h3>Einträge</h3>
    <input class="form-control mb-2" id="filterSpedition" placeholder="Filter Spedition">

    <table class="table table-striped" id="entriesTable">
      <thead>
        <tr>
          <th>Datum</th>
          <th>Spedition</th>
          <th>Lieferschein</th>
          <th>Erhalten</th>
          <th>Abgegeben</th>
          <th>Erfasser</th>
          <th>Aktion</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <h3>Timeline</h3>
    <div class="row mb-3">
      <div class="col-md-4">
        <input type="date" id="timelineDate" class="form-control">
      </div>
      <div class="col-md-4">
        <button class="btn btn-secondary" id="calcTimeline">Berechnen</button>
      </div>
    </div>

    <table class="table table-bordered" id="timelineTable">
      <thead>
        <tr><th>Spedition</th><th>Bestand</th></tr>
      </thead>
      <tbody></tbody>
    </table>

    <h3>Bestandsdiagramm</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="modal fade" id="settingsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Einstellungen</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <h6>Speditionen</h6>
          <form id="speditionForm" class="mb-3">
            <div class="input-group">
              <input type="text" class="form-control" id="newSpedition" placeholder="Neue Spedition" required>
              <button type="submit" class="btn btn-primary">Hinzufügen</button>
            </div>
          </form>
          <ul class="list-group mb-4" id="speditionsList"></ul>

          <h6>Erfasser</h6>
          <form id="erfasserForm" class="mb-3">
            <div class="input-group">
              <input type="text" class="form-control" id="newErfasser" placeholder="Neuer Erfasser" required>
              <button type="submit" class="btn btn-primary">Hinzufügen</button>
            </div>
          </form>
          <ul class="list-group" id="erfasserList"></ul>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</body>
</html>
